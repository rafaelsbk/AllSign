<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        @page {
            size: a4;
            margin-top: 3.5cm;
            margin-bottom: 3.5cm;
            margin-left: 2cm;
            margin-right: 2cm;

            @frame header_frame {
                -pdf-frame-content: header_content;
                left: 0cm; width: 21cm;
                top: {{ header_margin_percent|default:2.0 }}%;
                height: 30mm;
            }

            @frame contract_number_frame {
                -pdf-frame-content: contract_number_content;
                left: 14cm; width: 6cm;
                top: {{ header_margin_percent|default:2.0 }}%;
                height: 30mm;
            }

            @frame footer_frame {
                -pdf-frame-content: footer_content_img;
                left: 0cm; width: 21cm;
                bottom: {{ footer_margin_percent|default:2.0 }}%;
                height: 30mm;
            }
        }
        
        body {
            font-family: Helvetica, sans-serif;
            font-size: 11pt;
            line-height: 1.5;
            text-align: justify;
            color: #000;
            width: 100%;
        }

        .content {
            width: 100%;
            display: block;
        }

        /* Estilos para o HTML vindo do Editor Lexical */
        h1, h2, h3 { 
            text-align: center; 
            text-transform: uppercase; 
            font-weight: bold;
            margin-bottom: 12pt;
            margin-top: 12pt;
            display: block;
            width: 100%;
        }
        
        p { 
            margin-bottom: 8pt; 
            text-align: justify;
            display: block;
            width: 100%;
        }

        table { 
            width: 100%; 
            table-layout: fixed; /* Força a distribuição proporcional das colunas */
            border-collapse: collapse; 
            margin-bottom: 15pt;
            -pdf-keep-with-next: true;
        }
        
        td, th { 
            border: 1px solid #000; 
            padding: 6px; 
            vertical-align: top;
            word-wrap: break-word; /* Evita que o texto empurre a largura da célula */
        }
        
        th { 
            background-color: #f2f2f2; 
            font-weight: bold;
        }

        ul, ol {
            margin-left: 20pt;
            margin-bottom: 10pt;
        }

        li {
            margin-bottom: 5pt;
        }

        .text-center { text-align: center; }
        .font-bold { font-weight: bold; }
        .uppercase { text-transform: uppercase; }
        .underline { text-decoration: underline; }
        
        /* Limpeza de elementos do Lexical que não devem aparecer no PDF */
        .lexical-spacer {
            display: none;
            height: 0;
            visibility: hidden;
        }

        span.text-blue-600 { color: #000; border: none; } /* Remove cores de preview no PDF */
        
    </style>
</head>
<body>
    <div id="contract_number_content" style="text-align: right;">
        {% if contract_number %}
            <p style="font-size: 9pt; font-weight: bold; color: #000; margin: 0; padding-top: 5mm; padding-right: 5mm;">
                CONTRATO Nº {{ contract_number }}
            </p>
        {% endif %}
    </div>

    <!-- Papel Timbrado Imagens -->
    <div id="header_content">
        {% if header_image_path %}
            <img src="{{ header_image_path }}" style="width: 100%; height: 25mm; object-fit: contain;">
        {% endif %}
    </div>

    <div id="footer_content_img">
        {% if footer_image_path %}
            <img src="{{ footer_image_path }}" style="width: 100%; height: 25mm; object-fit: contain;">
        {% endif %}
    </div>

    <!-- CONTEÚDO DINÂMICO DO EDITOR -->
    <div className="content">
        {% if html_content %}
            {{ html_content|safe }}
        {% else %}
            <p style="color: red; text-align: center;">Erro: Conteúdo do contrato não encontrado.</p>
        {% endif %}
    </div>

</body>
</html>
